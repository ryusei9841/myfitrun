<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>myfitrun</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="55%" stop-color="#FC4C02"/>
      <stop offset="100%" stop-color="#C2261A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="256" rx="96" ry="96" fill="url(#shine)"/>

  <!-- Pulse / heartbeat line behind runner -->
  <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M40 330 L140 330 L170 270 L210 380 L250 300 L285 330 L472 330"/>
  </g>

  <!-- Runner silhouette (stylized, motion forward) -->
  <g fill="#ffffff">
    <!-- Head -->
    <circle cx="310" cy="130" r="32"/>
    <!-- Torso -->
    <path d="M295 170
             C 280 200, 260 230, 235 250
             C 220 262, 215 280, 225 295
             L 265 318
             C 278 325, 286 318, 290 305
             L 305 258
             L 340 285
             L 330 360
             C 328 375, 338 388, 354 388
             C 370 388, 378 376, 380 360
             L 395 265
             C 398 245, 388 228, 370 220
             L 335 205
             L 345 178
             C 348 165, 340 152, 326 150
             Z"/>
    <!-- Front arm swinging forward -->
    <path d="M360 180
             C 378 175, 398 188, 402 208
             L 412 252
             C 414 268, 404 280, 390 278
             C 378 276, 370 266, 368 254
             L 358 210
             C 354 197, 350 186, 360 180 Z"/>
    <!-- Back leg kicked up -->
    <path d="M225 295
             C 200 305, 175 325, 160 355
             C 152 372, 162 388, 180 388
             C 195 388, 205 380, 215 365
             L 248 318 Z"/>
    <!-- Front leg driving -->
    <path d="M330 360
             C 325 390, 340 420, 365 432
             C 380 438, 395 430, 395 414
             C 395 402, 388 392, 378 385
             L 360 370 Z"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="280" cy="430" rx="170" ry="9" fill="#000000" fill-opacity="0.18"/>

  <!-- Wordmark -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
    <text x="256" y="478" font-size="62" font-weight="900" fill="#ffffff" letter-spacing="-1">
      myfitrun
    </text>
  </g>
</svg>
